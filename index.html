<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Form</title>
    <link rel="stylesheet" href="formproject.css">
    <meta name="description" content="A lovely form with a secret message.">
</head>
<body>
    <div class="container" id="mainContainer">
        <h1>Love Form 💙</h1>
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Enter your name" autocomplete="off">
        </div>
        <div class="form-group">
            <label for="age">Age</label>
            <input type="number" id="age" placeholder="Enter your age" autocomplete="off">
        </div>
        
        <div id="questionContainer" class="hidden">
            <p class="question-text">Will you love me?</p>
            <div class="buttons">
                <button id="btnYes" class="btn btn-yes">Yes</button>
                <button id="btnNo" class="btn btn-no">No</button>
            </div>
        </div>
    </div>

    <div id="resultContainer" class="hidden">
        <img id="resultImage" src="" alt="Result Image">
        <p id="resultMessage" class="result-message"></p>
    </div>

    <script src="formproject.js"></script>
</body>
</html>
